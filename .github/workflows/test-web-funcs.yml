name: "Unit Test: web-based functions"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  # Web crawlers might be outdated because of website updating, so run periodically to follow the changes
  schedule:
    - cron: "9 9 * * 3,6,0"
  workflow_dispatch:

jobs:
  test-web-crawlers:
    name: Test web crawlers
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: "utf-8"
      PYTEST_ADDOPTS: "-rA --color=yes --tb=long --showlocals"

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install poetry
        shell: bash
        run: pipx install poetry

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "poetry"

      - name: Install dependencies
        shell: bash
        run: poetry install --with dev

      - name: Test proxyfree.py
        shell: bash
        run: poetry run pytest unittest/test_proxyfree.py

      - name: Test web crawlers
        shell: bash
        run: poetry run pytest unittest/test_crawlers.py

      - name: Upload log as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: JavSP-web-funcs.log
          path: javsp/JavSP.log
