name: "Unit Test: web-based functions"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  # Web crawlers might be outdated because of website updating, so run periodically to follow the changes
  schedule:
    - cron: "9 9 * * 3,6,0"
  workflow_dispatch:

jobs:
  test-web-crawlers:
    name: Test web crawlers
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: "utf-8"
      PYTEST_ADDOPTS: "-rA --color=yes --tb=long --showlocals"

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test proxyfree.py
        run: uv run pytest unittest/test_proxyfree.py

      - name: Test web crawlers
        run: uv run pytest unittest/test_crawlers.py

      - name: Upload log as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: JavSP-web-funcs.log
          path: javsp/JavSP.log
