# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: "Unit Test: basic functions"

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test-basic-funcs:

    name: Test basic funcs on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Install uv
      run: pipx install uv

    - name: Setup Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --group dev

    - name: Test avid.py
      run: uv run pytest unittest/test_avid.py
    - name: Test file.py
      run: uv run pytest unittest/test_file.py
    - name: Test func.py
      run: uv run pytest unittest/test_func.py
    - name: Upload log as artifact
      uses: actions/upload-artifact@v7
      if: ${{ always() }}
      with:
        name: JavSP-basic-funcs-${{ matrix.os }}.log
        path: javspn/JavSP.log