name: "Unit Test: basic functions"

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: test-basic-funcs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-basic-funcs:
    name: Test basic funcs on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest unittest/test_avid.py unittest/test_file.py unittest/test_func.py

      - name: Upload log as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: JavSP-basic-funcs-${{ matrix.os }}.log
          path: javsp/JavSP.log
