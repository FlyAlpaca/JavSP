name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run freeze build
        id: freeze
        uses: ./.github/actions/freeze-build
        with:
          version-source: git-ref

      - name: Save VERSION
        shell: bash
        run: printf '%s\n' "${{ steps.freeze.outputs.version }}" > VERSION.txt

      - name: Upload dist directory
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ runner.os }}
          path: |
            dist/
            VERSION.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Download Linux build
        uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: build-linux

      - name: Download macOS build
        uses: actions/download-artifact@v8
        with:
          name: build-macOS
          path: build-macOS

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: build-Windows
          path: build-Windows

      - name: Set VERSION
        shell: bash
        run: echo "VERSION=$(cat build-linux/VERSION.txt)" >> "$GITHUB_ENV"

      - name: Package Linux
        shell: bash
        run: tar czf "JavSP-${VERSION}-linux.tar.gz" -C build-linux/dist .

      - name: Package macOS
        shell: bash
        run: tar czf "JavSP-${VERSION}-macos.tar.gz" -C build-macOS/dist .

      - name: Package Windows
        shell: bash
        run: |
          cd build-Windows/dist
          zip -r "../../JavSP-${VERSION}-windows.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            JavSP-*-linux.tar.gz
            JavSP-*-macos.tar.gz
            JavSP-*-windows.zip
          generate_release_notes: true
