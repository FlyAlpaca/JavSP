name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Install poetry
        run: pipx install poetry

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'poetry'

      - name: Setup dynamic versioning
        run: poetry self add poetry-dynamic-versioning

      - name: Install dependencies
        run: poetry install

      - name: Build with Cx_Freeze
        run: poetry run python setup.py build_exe -b dist

      - name: Set VERSION
        shell: bash
        run: echo "VERSION=$(poetry run python tools/version.py)" >> $GITHUB_ENV

      - name: Set archive name (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: echo "ARCHIVE=JavSP-${VERSION}-linux.tar.gz" >> $GITHUB_ENV

      - name: Set archive name (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: echo "ARCHIVE=JavSP-${VERSION}-macos.tar.gz" >> $GITHUB_ENV

      - name: Set archive name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "ARCHIVE=JavSP-${env:VERSION}-windows.zip" >> $env:GITHUB_ENV

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf "../${ARCHIVE}" *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path * -DestinationPath "../${env:ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true