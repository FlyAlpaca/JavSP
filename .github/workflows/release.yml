name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Install poetry
        run: pipx install poetry

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'poetry'

      - name: Setup dynamic versioning
        run: poetry self add poetry-dynamic-versioning

      - name: Install dependencies
        run: poetry install

      - name: Build with Cx_Freeze
        run: poetry run python setup.py build_exe -b dist

      - name: Save VERSION
        shell: bash
        run: poetry run python tools/version.py > VERSION.txt

      - name: Upload dist directory
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ runner.os }}
          path: |
            dist/
            VERSION.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Download Linux build
        uses: actions/download-artifact@v8
        with:
          name: build-Linux
          path: build-linux

      - name: Download macOS build
        uses: actions/download-artifact@v8
        with:
          name: build-macOS
          path: build-macOS

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: build-Windows
          path: build-Windows

      - name: Set VERSION
        shell: bash
        run: echo "VERSION=$(cat build-linux/VERSION.txt)" >> $GITHUB_ENV

      - name: Package Linux
        shell: bash
        run: tar czf "JavSP-${VERSION}-linux.tar.gz" -C build-linux/dist .

      - name: Package macOS
        shell: bash
        run: tar czf "JavSP-${VERSION}-macos.tar.gz" -C build-macOS/dist .

      - name: Package Windows
        shell: bash
        run: |
          cd build-Windows/dist
          zip -r "../../JavSP-${VERSION}-windows.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            JavSP-*-linux.tar.gz
            JavSP-*-macos.tar.gz
            JavSP-*-windows.zip
          generate_release_notes: true