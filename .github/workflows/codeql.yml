name: "CodeQL"

on:
  push:
    branches: ["master"]
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  pull_request:
    branches: ["master"]
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  schedule:
    - cron: "0 8 15 * *"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        language: ["python"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
