name: "Cx_Freeze"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Run freeze build
        id: freeze
        uses: ./.github/actions/freeze-build
        with:
          version-source: tool

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: JavSP-${{ steps.freeze.outputs.version }}-${{ matrix.os }}
          path: dist
