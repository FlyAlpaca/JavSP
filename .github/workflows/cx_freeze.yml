name: "Cx_Freeze"

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'unittest/data/*.json'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: cx-freeze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run freeze build
        id: freeze
        uses: ./.github/actions/freeze-build
        with:
          version-source: tool

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: JavSP-${{ steps.freeze.outputs.version }}-${{ matrix.os }}
          path: dist
