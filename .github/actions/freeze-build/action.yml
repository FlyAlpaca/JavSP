name: "Freeze build"
description: "Install uv, install dependencies, write the VERSION file, and run cx_Freeze to produce the frozen binary directory. Exposes the version via the `version` output so callers can name artifacts consistently."

inputs:
  python-version:
    description: "Python version to install via setup-uv"
    required: false
    default: "3.14"
  version-source:
    description: |
      Where to read the version from.
      - "git-ref": use the GITHUB_REF_NAME env var (intended for release builds triggered by tag pushes)
      - "tool": run `uv run python tools/version.py` (intended for CI smoke builds)
    required: false
    default: "git-ref"

outputs:
  version:
    description: "The version string used for this build"
    value: ${{ steps.write-version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Install uv and set up Python
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --extra dev

    - name: Write VERSION file
      id: write-version
      shell: bash
      run: |
        if [ "${{ inputs.version-source }}" = "tool" ]; then
          VERSION=$(uv run python tools/version.py)
        else
          VERSION="$GITHUB_REF_NAME"
        fi
        printf '%s\n' "$VERSION" > javsp/VERSION
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Build with Cx_Freeze
      shell: bash
      run: rm -rf dist && uv run python setup.py build_exe -b dist
