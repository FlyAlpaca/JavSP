name: "Freeze build"
description: "Install Poetry, install dependencies, write the VERSION file, and run cx_Freeze to produce the frozen binary directory. Exposes the version via the `version` output so callers can name artifacts consistently."

inputs:
  python-version:
    description: "Python version to install via actions/setup-python"
    required: false
    default: "3.14"
  version-source:
    description: |
      Where to read the version from.
      - "git-ref": use the GITHUB_REF_NAME env var (intended for release builds triggered by tag pushes)
      - "tool": run `poetry run python tools/version.py` (intended for CI smoke builds)
    required: false
    default: "git-ref"

outputs:
  version:
    description: "The version string used for this build"
    value: ${{ steps.write-version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Install poetry
      shell: bash
      run: pipx install poetry

    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: "poetry"

    - name: Setup dynamic versioning
      shell: bash
      run: poetry self add poetry-dynamic-versioning

    - name: Install dependencies
      shell: bash
      run: poetry install --with dev

    - name: Write VERSION file
      id: write-version
      shell: bash
      run: |
        if [ "${{ inputs.version-source }}" = "tool" ]; then
          VERSION=$(poetry run python tools/version.py)
        else
          VERSION="$GITHUB_REF_NAME"
        fi
        printf '%s\n' "$VERSION" > javsp/VERSION
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Build with Cx_Freeze
      shell: bash
      run: rm -rf dist && poetry run python setup.py build_exe -b dist
