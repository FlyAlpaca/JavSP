# ============================================================================
# JavSP 用户配置文件
#
# 使用说明：
#   1. 只需写你要修改的部分，未写的字段自动使用 config_default.yml 的默认值
#   2. 修改后保存，重新运行 JavSP 即可生效
#   3. 也可以通过命令行参数 -c 指定其他配置文件
#
# 常见场景示例见下方，取消对应行的注释（删除行首的 #）即可使用。
# 完整配置项及说明请参考 config_default.yml。
# ============================================================================

# --- 代理设置 ---
# 大部分站点需要代理才能访问，设置你的代理地址
# 支持 http 和 socks5 代理，例如 'http://127.0.0.1:7890' 或 'socks5h://127.0.0.1:1080'
# 不需要代理请保持注释状态
#network:
#  proxy_server: 'http://127.0.0.1:7890'

# --- 输入目录 ---
# 设置要整理的影片文件夹路径，设置后启动时不再询问
# Windows 示例: 'D:\Videos'
# macOS/Linux 示例: '/home/user/Videos'
#scanner:
#  input_directory: '/home/user/Videos'

# --- 翻译设置 ---
# 将标题和简介从日文翻译为中文，推荐使用免费引擎
# Bing 翻译（免费，推荐）:
#translator:
#  engine:
#    type: bing
#    target_language: zh-Hans

# 阿里翻译（免费，国内可用）:
#translator:
#  engine:
#    type: alibaba
#    target_language: zh

# Google 翻译（免费，需代理）:
#translator:
#  engine:
#    type: google
#    target_language: zh-CN

# OpenAI 兼容 API（DeepSeek, Groq, 硅基流动等）:
#translator:
#  engine:
#    type: openai_compatible
#    base_url: 'https://api.deepseek.com/v1'
#    api_key: 'your-api-key'
#    model: 'deepseek-chat'

# --- 爬虫设置 ---
# 调整爬虫顺序或禁用某些站点
#crawler:
#  selection:
#    normal: [javbus, javdb, javlib, jav321, mgstage, prestige]
#    fc2: [fc2, javdb, javmenu, fc2ppvdb]

# --- 文件整理设置 ---
# 修改整理后的文件命名规则和存放路径
#summarizer:
#  path:
#    output_folder_pattern: '#整理完成/{actress}/[{num}] {title}'
#    hard_link: false
#  nfo:
#    title_pattern: '{num} {title}'

# --- 调试模式 ---
# 启用后输出详细的爬虫抓取日志、网络请求详情等
#other:
#  debug: true
